<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>מהנדסי PevOps הקטנים</title>
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="דוגמה קטנה: מהנדסי PevOps חמודים (SVG)">

<body>
  <header>
    <h1>מהנדסי PevOps הקטנים</h1>
    <p>דוגמה אינטראקטיבית פשוטה להצגת מהנדסי DevOps קטנים.</p>

  <main>
    <section class="grid">
      <!-- Six small 'engineers' rendered as inline SVG -->
      <!-- Reuse a compact SVG for each card -->
      <figure class="engineer">
        <svg viewBox="0 0 120 140" class="icon" aria-hidden="true">
          <rect x="10" y="70" width="100" height="60" rx="8" fill="#4b9be6" />
          <circle cx="60" cy="40" r="24" fill="#ffd89b" />
          <rect x="52" y="50" width="16" height="20" fill="#2b2b2b" rx="3" />
          <g transform="translate(82,90) scale(0.9)">
            <path d="M0 0 L18 6 L6 18 L-12 6 Z" fill="#ffd89b" />
          </g>
        </svg>
        <figcaption>מהנדס 1</figcaption>
      </figure>

      <figure class="engineer">
        <svg viewBox="0 0 120 140" class="icon" aria-hidden="true">
